<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrith World 🌍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
            min-height: 100vh;
            color: #f0f9ff;
            padding: 20px;
        }
        .contenedor {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.85);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
            border: 2px solid rgba(129, 140, 248, 0.4);
        }
        h1 { color: #a5b4fc; text-align: center; margin-bottom: 20px; font-size: 2.2rem; }
        .estado {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-around;
            background: rgba(30, 41, 59, 0.7);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .texto {
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(51, 65, 85, 0.5);
            border-radius: 10px;
            border-left: 4px solid #818cf8;
        }
        .opciones { display: flex; flex-direction: column; gap: 12px; }
        button {
            padding: 14px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        button:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>🌍 ZENTRITH WORLD</h1>
        <div class="estado">
            <div>❤️ Salud: <span id="salud">100</span>/100</div>
            <div>⭐ Puntos: <span id="puntos">0</span></div>
            <div>🔑 Llave: <span id="llave">No</span></div>
            <div>⚔️ Espada: <span id="espada">No</span></div>
        </div>
        <div class="texto" id="textoJuego"></div>
        <div class="opciones" id="botones"></div>
    </div>

    <script>
        // Variables del juego
        let salud = 100;
        let puntos = 0;
        let tieneLlave = false;
        let tieneEspada = false;

        // Elementos de pantalla
        const textoJuego = document.getElementById('textoJuego');
        const botones = document.getElementById('botones');
        const txtSalud = document.getElementById('salud');
        const txtPuntos = document.getElementById('puntos');
        const txtLlave = document.getElementById('llave');
        const txtEspada = document.getElementById('espada');

        // Actualizar datos en pantalla
        function actualizarEstado() {
            txtSalud.textContent = salud;
            txtPuntos.textContent = puntos;
            txtLlave.textContent = tieneLlave ? 'Sí ✅' : 'No ❌';
            txtEspada.textContent = tieneEspada ? 'Sí ✅' : 'No ❌';
        }

        // Mostrar texto y botones
        function mostrar(mensaje, opciones) {
            textoJuego.textContent = mensaje;
            botones.innerHTML = '';
            opciones.forEach(op => {
                const btn = document.createElement('button');
                btn.textContent = op.texto;
                btn.onclick = op.accion;
                botones.appendChild(btn);
            });
            actualizarEstado();
        }

        // Pantalla inicial
        function inicio() {
            mostrar(
                'Bienvenido a Zentrith, un mundo lleno de magia y misterios. Tu misión es explorar, conseguir objetos y descubrir el gran tesoro oculto. ¿Por dónde empezás tu aventura?',
                [
                    { texto: '🌲 Bosque de Cristal', accion: bosque },
                    { texto: '🏘️ Aldea de los Sabios', accion: aldea },
                    { texto: '🌋 Montaña de Fuego', accion: montaña },
                    { texto: '📋 Ver mi estado', accion: verEstado }
                ]
            );
        }

        function bosque() {
            let azar = Math.floor(Math.random() * 4);
            let mensaje = '';
            if (azar === 0) {
                mensaje = '✨ Encontraste una gema mágica entre las ramas brillantes! Sumás 50 puntos.';
                puntos += 50;
            } else if (azar === 1) {
                if (!tieneLlave) {
                    mensaje = '🔑 Buscando entre raíces antiguas, encontraste una llave con grabados extraños!';
                    tieneLlave = true;
                    puntos += 20;
                } else {
                    mensaje = 'Caminás entre árboles que brillan suavemente, ya conocés bien este lugar.';
                    puntos += 10;
                }
            } else if (azar === 2) {
                mensaje = '🐉 Una pequeña criatura luminosa te regala una poción! Recuperás salud.';
                salud = Math.min(salud + 20, 100);
                puntos += 30;
            } else {
                mensaje = '🍃 El camino es tranquilo y lleno de luces hermosas, avanzás un buen tramo.';
                puntos += 10;
            }
            mostrar(mensaje + '\n¿Qué querés hacer ahora?', [
                { texto: 'Seguir explorando el bosque', accion: bosque },
                { texto: 'Ir a la Aldea', accion: aldea },
                { texto: 'Volver al inicio', accion: inicio }
            ]);
        }

        function aldea() {
            let mensaje = '';
            if (!tieneEspada) {
                mensaje = 'Un anciano sabio te recibe con una sonrisa y te dice: "Este mundo necesita valientes como vos". Te entrega una espada encantada que brilla con luz propia! ⚔️';
                tieneEspada = true;
                puntos += 40;
            } else {
                mensaje = 'Te saludan con cariño y te cuentan leyendas sobre el tesoro guardado en la cima de la montaña.';
                puntos += 15;
            }
            mostrar(mensaje + '\n¿Seguís tu camino?', [
                { texto: 'Ir al Bosque de Cristal', accion: bosque },
                { texto: 'Subir a la Montaña de Fuego', accion: montaña },
                { texto: 'Volver al inicio', accion: inicio }
            ]);
        }

        function montaña() {
            let mensaje = '';
            if (tieneLlave && tieneEspada) {
                mensaje = '🔥 Al llegar a la cueva más alta, la llave abre una puerta enorme y encontrás el TESORO DE ZENTRITH! 🎉 Conseguiste 200 puntos extra y completaste tu aventura!';
                puntos += 200;
            } else {
                mensaje = 'El camino es muy difícil y peligroso, sentís que te falta algo importante para llegar hasta el final... Perdés un poco de salud.';
                salud -= 15;
            }
            mostrar(mensaje, [
                { texto: 'Volver a buscar lo que falta', accion: inicio },
                { texto: 'Intentar de nuevo acá', accion: montaña }
            ]);
        }

        function verEstado() {
            mostrar(
                'Tu estado actual en Zentrith:\n' +
                'Salud: ' + salud + '/100\n' +
                'Puntos acumulados: ' + puntos + '\n' +
                'Tenés la llave antigua: ' + (tieneLlave ? 'Sí' : 'No') + '\n' +
                'Tenés la espada encantada: ' + (tieneEspada ? 'Sí' : 'No'),
                [
                    { texto: 'Seguir explorando', accion: inicio }
                ]
            );
        }

        // Empezar el juego
        inicio();
    </script>
</body>
</html>
