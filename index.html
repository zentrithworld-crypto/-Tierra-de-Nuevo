<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL EXPERIMENTO 🔬</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body {
            background: #0a0a0d;
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .contenedor {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(20, 20, 25, 0.92);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(120, 0, 0, 0.4);
            border: 1px solid #3a0000;
        }
        h1 { color: #991b1b; text-align: center; margin-bottom: 20px; letter-spacing: 3px; }
        .estado {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-around;
            background: rgba(40, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .texto {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(30, 30, 35, 0.6);
            border-radius: 8px;
            border-left: 3px solid #7f1d1d;
            color: #d4d4d4;
        }
        .opciones { display: flex; flex-direction: column; gap: 12px; }
        button {
            padding: 13px 18px;
            font-size: 1rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: linear-gradient(135deg, #292929, #1f1f1f);
            color: #e5e5e5;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        button:hover {
            background: linear-gradient(135deg, #3f1f1f, #2a1515);
            border-color: #7f1d1d;
            transform: translateX(3px);
        }
        .oscuro { background: #050505; color: #444; }
        .advertencia { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>🔬 EL EXPERIMENTO</h1>
        <div class="estado">
            <div>❤️ Energía: <span id="energia">100</span>%</div>
            <div>🔦 Linterna: <span id="linterna">No</span></div>
            <div>🔑 Llave: <span id="llave">No</span></div>
            <div>📍 Zona: <span id="zona">Laboratorio</span></div>
        </div>
        <div class="texto" id="textoJuego"></div>
        <div class="opciones" id="botones"></div>
    </div>

    <script>
        // Variables del juego
        let energia = 100;
        let tieneLinterna = false;
        let linternaEncendida = false;
        let tieneLlave = false;
        let estaOscuro = true;

        // Elementos
        const textoJuego = document.getElementById('textoJuego');
        const botones = document.getElementById('botones');
        const txtEnergia = document.getElementById('energia');
        const txtLinterna = document.getElementById('linterna');
        const txtLlave = document.getElementById('llave');
        const txtZona = document.getElementById('zona');

        // Actualizar pantalla
        function actualizarEstado() {
            txtEnergia.textContent = energia;
            txtLinterna.textContent = tieneLinterna ? (linternaEncendida ? 'Sí ✅ Encendida' : 'Sí ⚫ Apagada') : 'No ❌';
            txtLlave.textContent = tieneLlave ? 'Sí ✅' : 'No ❌';
            txtZona.textContent = estaOscuro ? 'Muy oscuro...' : 'Iluminado';
            document.body.classList.toggle('oscuro', estaOscuro && !linternaEncendida);
        }

        // Mostrar mensaje y botones
        function mostrar(mensaje, opciones) {
            textoJuego.innerHTML = mensaje;
            botones.innerHTML = '';
            opciones.forEach(op => {
                const btn = document.createElement('button');
                btn.textContent = op.texto;
                btn.onclick = op.accion;
                botones.appendChild(btn);
            });
            actualizarEstado();
        }

        // Inicio
        function inicio() {
            estaOscuro = true;
            mostrar(
                'Despertás de golpe. No sabés dónde estás. Todo se ve muy oscuro. Escuchás un zumbido lejano y golpes secos que vienen de algún lado... Recordás poco: solo que acá pasan cosas raras. Tenés que salir. ¿Qué hacés primero?',
                [
                    { texto: '🔎 Buscar algo cerca tuyo', accion: buscarCerca },
                    { texto: '🚪 Caminar hacia la puerta', accion: puertaCerrada },
                    { texto: '👂 Quedarte quieto y escuchar', accion: escuchar }
                ]
            );
        }

        function buscarCerca() {
            energia -= 5;
            if (!tieneLinterna) {
                mostrar(
                    'Tanteando entre muebles viejos y papeles tirados... tocás algo de plástico y vidrio: ¡es una linterna! Parece que tiene carga. ¿Ahora qué hacés?',
                    [
                        { texto: '🔦 Encender la linterna', accion: encenderLinterna },
                        { texto: 'Buscar más cosas', accion: buscarMas },
                        { texto: 'Ir hacia el pasillo', accion: pasillo }
                    ]
                );
                tieneLinterna = true;
            } else {
                mostrar(
                    'Ya revisaste por acá. No hay nada nuevo, solo informes viejos con nombres tachados y símbolos extraños. Sentís que te miran...',
                    [
                        { texto: 'Seguir revisando', accion: buscarMas },
                        { texto: 'Ir al pasillo', accion: pasillo }
                    ]
                );
            }
        }

        function encenderLinterna() {
            linternaEncendida = !linternaEncendida;
            estaOscuro = false;
            mostrar(
                linternaEncendida 
                    ? 'La luz ilumina poco, pero alcanza para ver paredes manchadas y puertas cerradas. Al fondo hay una puerta con un cartel rojo que dice "NO ENTRAR".'
                    : 'Apagaste la linterna. Todo vuelve a ser oscuridad total.',
                [
                    { texto: '🔦 Apagar/Encender de nuevo', accion: encenderLinterna },
                    { texto: '🚶 Ir al pasillo largo', accion: pasillo },
                    { texto: '📄 Leer papeles que hay en la mesa', accion: leerPapeles }
                ]
            );
        }

        function leerPapeles() {
            mostrar(
                'Dicen cosas incomprensibles: "Sujeto 47... reacciona a la luz... no debe salir... el experimento cambió todo". De repente escuchás que una puerta se abre sola más allá...',
                [
                    { texto: '👀 Mirar qué se abrió', accion: verRuido },
                    { texto: '🔑 Buscar llave en los cajones', accion: buscarLlave },
                    { texto: '🏃 Ir rápido por el pasillo', accion: pasillo }
                ]
            );
        }

        function buscarLlave() {
            energia -= 8;
            if (!tieneLlave) {
                tieneLlave = true;
                mostrar(
                    '¡Encontraste una llave pequeña de metal frío! Tiene grabado un símbolo extraño. Seguro abre alguna puerta importante. Pero escuchás pasos que se acercan...',
                    [
                        { texto: '🚪 Probar la puerta principal', accion: puertaSalida },
                        { texto: '🙈 Esconderte rápido', accion: esconderse }
                    ]
                );
            } else {
                mostrar('Acá no hay nada más que encontrar. Tenés la llave, buscá la cerradura.', [
                    { texto: 'Ir al pasillo', accion: pasillo }
                ]);
            }
        }

        function puertaCerrada() {
            mostrar(
                'La puerta tiene una cerradura vieja pero firme. No se abre a menos que tengas la llave. Del otro lado se escuchan ruidos suaves, como si alguien arrastrara algo pesado...',
                tieneLlave 
                    ? [{ texto: '🔑 Usar la llave ahora', accion: puertaSalida }]
                    : [
                        { texto: '🔎 Buscar la llave', accion: buscarLlave },
                        { texto: 'Volver a buscar cosas', accion: buscarCerca }
                    ]
            );
        }

        function pasillo() {
            energia -= 10;
            mostrar(
                'El pasillo es largo y oscuro. Hay puertas a los costados, la mayoría cerradas. Al fondo se ve una luz muy tenue y se escucha un ruido constante... como máquinas andando solas.',
                [
                    { texto: '🚶 Avanzar hasta el fondo', accion: finalPasillo },
                    { texto: '🚪 Probar una puerta de al lado', accion: otraPuerta },
                    { texto: 'Volver atrás rápido', accion: inicio }
                ]
            );
        }

        function finalPasillo() {
            mostrar(
                'Llegás al final. Hay una puerta grande con una placa que dice "SALA PRINCIPAL". La cerradura es igual a la de tu llave. Pero de adentro salen sonidos que ponen la piel de gallina...',
                tieneLlave 
                    ? [{ texto: '🔑 Abrir y entrar', accion: puertaSalida }]
                    : [{ texto: 'Tenés que conseguir la llave primero', accion: buscarLlave }]
            );
        }

        function puertaSalida() {
            mostrar(
                'Insertás la llave... da vueltas con un sonido seco. La puerta se abre despacio y se escucha un viento fresco: ¡es la salida! Pero mirás atrás una última vez y sentís que algo te está mirando desde la oscuridad... <br><br class="advertencia">¿Te vas ya o te quedás?',
                [
                    { texto: '🏃¡SALIR DE ACÁ YA!', accion: ganarJuego },
                    { texto: '🔎 Mirar un segundo más...', accion: peligro }
                ]
            );
        }

        function escuchar() {
            mostrar(
                'Cerrás los ojos y te quedás en silencio... Los ruidos no son de viento. Son pasos. Y se están acercando cada vez más. No tenés mucho tiempo.',
                [
                    { texto: '🔦 Buscar luz rápido', accion: buscarCerca },
                    { texto: '🏃 Correr sin mirar', accion: pasillo }
                ]
            );
        }

        function verRuido() {
            energia -= 15;
            mostrar(
                'Una puerta al fondo se abrió de golpe. No se ve a nadie, pero se siente una corriente de aire helado. Escuchás una voz muy baja que dice: "No te vayas... todavía no terminamos..."',
                [
                    { texto: '😨 Ir hacia la voz', accion: peligro },
                    { texto: '🏃 Correr hacia la salida', accion: puertaCerrada }
                ]
            );
        }

        function esconderse() {
            energia -= 20;
            mostrar(
                'Te metés detrás de unos estantes altos. Los pasos pasan justo al lado tuyo. Sentís una respiración pesada. Se quedan quietos un rato... y luego se van poco a poco. ¡Fue por poco!',
                [
                    { texto: 'Salir rápido y buscar la salida', accion: puertaSalida }
                ]
            );
        }

        function buscarMas() {
            energia -= 6;
            let azar = Math.floor(Math.random() * 2);
            if (azar === 0 && !tieneLlave) {
                mostrar('Encontrás un papel arrugado que dice: "La llave está donde guardamos lo importante". Pero no encontraste la llave todavía.', [
                    { texto: 'Seguir buscando', accion: buscarLlave },
                    { texto: 'Ir al pasillo', accion: pasillo }
                ]);
            } else {
                mostrar('No hay nada más acá. Solo más papeles viejos y polvo. Sentís que te cansás un poco más.', [
                    { texto: 'Buscar en otro lado', accion: buscarLlave },
                    { texto: 'Ir al pasillo', accion: pasillo }
                ]);
            }
        }

        function otraPuerta() {
            mostrar('Está cerrada con candado viejo, no sirve romperla. Mejor andá a la puerta principal o busca la llave verdadera.', [
                { texto: 'Seguir al fondo', accion: finalPasillo }
            ]);
        }

        function peligro() {
            mostrar(
                'No deberías haberte quedado mirando... Algo salió de la oscuridad y te tapó la vista. No podés moverte. Todo se vuelve negro de golpe... <br><br class="advertencia">💀 FINAL: Te quedaste atrapado en el experimento.',
                [
                    { texto: '🔄 Intentar escapar otra vez', accion: reiniciar }
                ]
            );
        }

        function ganarJuego() {
            mostrar(
                'Salís y cerrás la puerta detrás tuyo. Corrés hasta llegar a un camino lejos de ese lugar. Ya no escuchás nada. Lo lograste... pero sabés que esa puerta sigue ahí, esperando a alguien más. <br><br> 🎉 ¡LOGRASTE ESCAPAR DE EL EXPERIMENTO!',
                [
                    { texto: '🔄 Jugar de nuevo', accion: reiniciar }
                ]
            );
        }

        function reiniciar() {
            energia = 100;
            tieneLinterna = false;
            linternaEncendida = false;
            tieneLlave = false;
            estaOscuro = true;
            inicio();
        }

        // Empezar
        inicio();
    </script>
</body>
</html>
